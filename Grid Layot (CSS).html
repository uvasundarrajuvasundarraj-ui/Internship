<!DOCTYPE html>
<html>
<head>
<style>
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}
.grid div {
    background: lightgray;
    padding: 20px;
    text-align: center;
}
</style>
</head>
<body>

<div class="grid">
    <div>1</div>
    <div>2</div>
    <div>3</div>
</div>

</body>
</html>
