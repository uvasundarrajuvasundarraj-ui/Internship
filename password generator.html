<!DOCTYPE html> 
<html>
<body>

<button onclick="generate()">Generate Password</button>
<p id="pass"></p>

<script>
function generate(){
    let chars = "abcdefghijklmnopqrstuvwxyz123456789";
    let pass = "";
    
    for (let i = 0; i < 6; i++){
        pass += chars[Math.floor(Math.random() * chars.length)];
    }
    
    document.getElementById("pass").innerHTML = pass;
}
</script>

</body>
</html>
